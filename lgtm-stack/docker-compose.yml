services:
  tempo:
    image: grafana/tempo:2.10.1@sha256:9371af1b75b4e057eb77f22dc4dd4d9176cd6985e29f181527be6723b7f29c41
    container_name: tempo
    command: ["-config.file=/etc/tempo/tempo-config.yml"]
    volumes:
      - ./tempo:/etc/tempo
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      - seaweedfs-init
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
        reservations:
          memory: 512M

  loki:
    image: grafana/loki:3.6.7@sha256:3c8fd3570dd9219951a60d3f919c7f31923d10baee578b77bc26c4a0b32d092d
    container_name: loki
    volumes:
      - ./loki:/etc/loki
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      - seaweedfs-init

  alloy:
    image: grafana/alloy:v1.13.2@sha256:8abcd0d97a97099cabb34be8dcfc448fca6c35931ae9291aaf74056105dedcca
    container_name: alloy
    user: root
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    ports:
      - "4317:4317"
      - "4318:4318"
      - "12345:12345"
    volumes:
      - ./alloy:/etc/alloy
      - ./alloy/targets:/etc/alloy/targets:ro
      - /var/log:/var/log:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      - tempo
      - loki

  alertmanager:
    image: prom/alertmanager:v0.31.1@sha256:88b605de9aba0410775c1eb3438f951115054e0d307f23f274a4c705f51630c1
    container_name: alertmanager
    volumes:
      - ./alertmanager:/etc/alertmanager
      - alertmanager-data:/alertmanager
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sed "s|\$${TELEGRAM_BOT_TOKEN}|${TELEGRAM_BOT_TOKEN}|g; s|\$${TELEGRAM_SERVICE_CHAT_ID}|${TELEGRAM_SERVICE_CHAT_ID}|g; s|\$${TELEGRAM_PLATFORM_CHAT_ID}|${TELEGRAM_PLATFORM_CHAT_ID}|g" /etc/alertmanager/alertmanager.yml.template > /tmp/alertmanager.yml && \
        /bin/alertmanager \
        --config.file=/tmp/alertmanager.yml \
        --storage.path=/alertmanager \
        --web.external-url=${ALERTMANAGER_URL}
    restart: unless-stopped
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  seaweedfs:
    image: chrislusf/seaweedfs:4.15@sha256:1593bd2a98964f5d4df83fa7db2b3d4ee7b20190813cc5bf8c3200e0e70d346e
    container_name: seaweedfs
    command: "server -s3 -s3.port=9000 -dir=/data -s3.config=/etc/seaweedfs/s3.json"
    environment:
      - WEED_MASTER_VOLUME_GROWTH_COPY_1=1
    ports:
      - "9000:9000"
      - "9333:9333"
      - "8080:8080"
    volumes:
      - seaweedfs-data:/data
      - ./seaweedfs:/etc/seaweedfs
    restart: unless-stopped
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9333/cluster/status"]
      # test: ["CMD", "wget", "--spider", "-q", "http://localhost:9333/cluster/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  seaweedfs-init:
    image: amazon/aws-cli:2.34.3@sha256:c7ecfd5d7bc31398760696604c7710ae36fbc031f9efcbb5ea6dcc09f82b9405
    container_name: seaweedfs-init
    depends_on:
      seaweedfs:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=mimir
      - AWS_SECRET_ACCESS_KEY=mimir123
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for SeaweedFS S3 to be ready...';
      sleep 5;
      for bucket in mimir-blocks mimir-ruler mimir-alertmanager tempo loki; do
        echo \"Creating bucket: $$bucket\";
        aws --endpoint-url=http://seaweedfs:9000 s3 mb s3://$$bucket --region us-east-1 || echo \"Bucket $$bucket already exists or creation failed, continuing...\";
      done;
      echo 'Buckets created successfully';
      exit 0;
      "
    networks:
      - monitoring

  mimir:
    image: grafana/mimir:3.0.3@sha256:2d097da545a71ea13c6bf061be4406fa6d4af60335c99cab389a718148ce4b2d
    container_name: mimir
    command:
      - -config.file=/etc/mimir/mimir-config.yml
      - -target=all
    volumes:
      - ./mimir:/etc/mimir
      - ./mimir/rules:/data/mimir/rules
      - mimir-data:/data
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      - seaweedfs-init

  grafana:
    image: grafana/grafana:12.4.0@sha256:b0ae311af06228bcfd4a620504b653db80f5b91e94dc3dc2a5b7dab202bcde20
    container_name: grafana
    ports:
      - 3000:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-AISoft123#@!}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=netsage-sankey-panel
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      - alloy
      - alertmanager
      - mimir
      - loki
      - tempo
    healthcheck:
      test:
        ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  node-exporter:
    image: prom/node-exporter:v1.10.2@sha256:3ac34ce007accad95afed72149e0d2b927b7e42fd1c866149b945b84737c62c3
    container_name: node-exporter
    command:
      - "--path.rootfs=/host"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
      - /run/udev:/run/udev:ro
    restart: unless-stopped
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:9100/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.28.0@sha256:e753ff9f3fc458d02cca5eddab5a77e1c175eee484a8925ac7d524f04366c2fc
    container_name: blackbox-exporter
    ports:
      - 9115:9115
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"
    restart: unless-stopped
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9115/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  grafana-data:
  loki-data:
  tempo-data:
  seaweedfs-data:
  mimir-data:
  alertmanager-data:
  alloy-data:

networks:
  monitoring:
    driver: bridge
