name: Renovate

on:
    schedule:
        - cron: "0 19 * * *"
    workflow_dispatch:
    pull_request:
        types: [ opened ]

jobs:
    renovate:
        if: github.event_name != 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Self-hosted Renovate
              uses: renovatebot/github-action@abd08c7549b2a864af5df4a2e369c43f035a6a9d # v46.1.5
              with:
                  configurationFile: renovate.json
                  token: ${{ secrets.RENOVATE_TOKEN || secrets.GITHUB_TOKEN }}
              env:
                  LOG_LEVEL: debug
                  RENOVATE_REPOSITORIES: ${{ github.repository }}

    notify:
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request' && startsWith(github.head_ref,
            'renovate/')
        steps:
            - name: Send Telegram Notification
              env:
                  TELEGRAM_NOTIFICATION_BOT_TOKEN: ${{ secrets.TELEGRAM_NOTIFICATION_BOT_TOKEN }}
                  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
              run: |
                  MESSAGE=$(cat <<EOF
                  [Renovate Update]

                  Repository: ${{ github.repository }}
                  PR Created: ${{ github.event.pull_request.title }}

                  View PR: ${{ github.event.pull_request.html_url }}
                  EOF
                  )

                  jq -nc \
                    --arg chat_id "$TELEGRAM_CHAT_ID" \
                    --arg text "$MESSAGE" \
                    '{chat_id: $chat_id, text: $text, disable_web_page_preview: true}' | \
                    curl -fsS -X POST -H 'Content-Type: application/json' \
                    --data @- \
                    "https://api.telegram.org/bot${TELEGRAM_NOTIFICATION_BOT_TOKEN}/sendMessage"
